<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainSpark - Home</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #16222A, #3A6073);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 15px 40px;
      background: #1c1c1c;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
    }

    .brand h1 {
      font-size: 1.6rem;
      color: #ffd369;
      margin: 0;
    }

    .user-info {
      font-size: 1rem;
    }

    .logout {
      background: #ff4b5c;
      color: #fff;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-left: 10px;
      transition: 0.3s ease;
    }

    .logout:hover {
      background: #d63342;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

    main h2 {
      font-size: 2.3rem;
      margin-bottom: 10px;
      color: #ffd369;
    }

    main p {
      margin-bottom: 30px;
      color: #eee;
      font-size: 1.1rem;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: #252a34;
      padding: 35px 25px;
      border-radius: 15px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
      transition: transform 0.3s ease, background 0.3s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-8px);
      background: #2f3640;
    }

    .card h3 {
      margin: 0 0 12px 0;
      color: #ffd369;
      font-size: 1.4rem;
    }

    .card p {
      font-size: 0.95rem;
      color: #bbb;
    }

    footer {
      padding: 15px;
      text-align: center;
      background: #1c1c1c;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img src="logo.png" alt="BrainSpark Logo">
      <h1>BrainSpark</h1>
    </div>
    <div class="user-info">
      Welcome, <strong>User</strong> 
      <button class="logout">Logout</button>
    </div>
  </header>

  <main>
    <h2>Welcome to BrainSpark</h2>
    <p>Challenge your mind with fun games & puzzles!</p>

    <div class="card-container">
      <div class="card" onclick="window.location.href='wordle.html'">
        <h3>Wordle Game</h3>
        <p>Guess the hidden word within limited attempts.</p>
      </div>
      <div class="card" onclick="window.location.href='quiz.html'">
        <h3>Quiz Game</h3>
        <p>Answer fun quizzes and climb the leaderboard.</p>
      </div>
    </div>
  </main>

  <footer>
    © 2025 BrainSpark | Ignite Your Mind
  </footer>
</body>
</html>
